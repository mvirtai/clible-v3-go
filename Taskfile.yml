version: "3"

dotenv:
  - ".env"

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list

  # --- Backend (Go) Tasks --- #
  backend:tidy:
    desc: Tidy and verify Go module dependencies
    dir: backend
    cmds:
      - go mod tidy
      - go mod verify

  backend:format:
    desc: Auto-format Go source code files
    dir: backend
    cmds:
      - go fmt ./...

  backend:lint:
    desc: Run golangci-lint on the Go source code
    dir: backend
    cmds:
      - golangci-lint run ./...

  backend:test-cov:
    desc: Run all Go unit and integration tests with race detector
    dir: backend
    cmds:
      - mkdir -p ../.cov/backend
      - go test -v -race -coverprofile=../.cov/backend/coverage.out ./internal/...
      - go tool cover -func=../.cov/backend/coverage.out | tee ../.cov/backend/coverage.txt

  backend:test-pkg:
    desc: "Run tests for a specific package and produce coverage report. Usage: task backend:test-pkg PKG=middleware"
    dir: backend
    vars:
      PKG: '{{default "" .PKG}}'
    preconditions:
      - sh: 'test -n "{{.PKG}}"'
        msg: "Missing PKG argument. Usage: task backend:test-pkg PKG=middleware"
    cmds:
      - mkdir -p ../.cov/backend
      - go test -v -race -coverprofile=../.cov/backend/{{.PKG}}.out ./internal/{{.PKG}}/...
      - go tool cover -func=../.cov/backend/{{.PKG}}.out | tee ../.cov/backend/{{.PKG}}.txt


  backend:build:
    desc: Build the Go HTTP API production binary
    dir: backend
    cmds:
      - go build -v -o bin/server ./cmd/api/main.go

  backend:run:
    desc: Run the Go HTTP API development bin/server
    dir: backend
    cmds:
      - go run ./cmd/api/main.go

  backend:dev:
    desc: Run the Go web-native REST API in watch/live mode
    dir: backend
    cmds:
      - go run main.go

  # --- Frontend (React) Tasks ---
  frontend:install:
    desc: Install frontend dependencies using pnpm
    dir: frontend
    cmds:
      - pnpm install

  frontend:lint:
    desc: Run linter and type-checks for the React application
    dir: frontend
    cmds:
      - pnpm run lint

  frontend:build:
    desc: Build the production frontend assets
    dir: frontend
    cmds:
      - pnpm run build

  frontend:test:
    desc: Run frontend unit tests
    dir: frontend
    cmds:
      - pnpm run test -- --reporter=verbose

  frontend:test-cov:
    desc: Run frontend unit tests and produce coverage report
    dir: frontend
    cmds:
      - pnpm run test -- --coverage --reporter=verbose

  frontend:test-ui:
    desc: Run frontend unit tests with Vitest UI
    dir: frontend
    cmds:
      - pnpm run test -- --coverage --reporter=html


  frontend:dev:
    desc: Run the React+Vite frontend development bin/server
    dir: frontend
    cmds:
      - pnpm run dev

  # --- Global Development --- #

  dev:
    desc: Boot up both systems concurrently for fullstack workspace development
    deps:
      - task: backend:dev
      - task: frontend:dev

  # --- Global Quality Gates --- #
  check:
    desc: Run all backend and frontend quality checks concurrently (lint and test)
    deps:
      - task: backend:check
      - task: frontend:check
    cmds:
      - echo "All local quality checks passed flawlessly!"

  backend:check:
    desc: Run all backend quality checks (tidy, lint, and test-cov)
    dir: backend
    cmds:
      - task: backend:tidy
      - task: backend:lint
      - task: backend:test-cov

  frontend:check:
    desc: Run all frontend quality checks (lint and test-cov)
    dir: frontend
    cmds:
      - task: frontend:lint
      - task: frontend:test-cov


  # --- Git --- #
  # --- Git & GitHub Automation ---
  # --- Git & GitHub Automation ---
  git:pr:
    desc: Create a GitHub PR using a permanent PR story file from ./pr_stories/
    vars:
      CURRENT_BRANCH:
        sh: git branch --show-current
      TITLE: "{{default .CURRENT_BRANCH .TITLE}}"
      # Automatically targets the pr_stories directory
      STORY_PATH: "pr_stories/{{.FILE}}"
    preconditions:
      - sh: command -v gh >/dev/null 2>&1
        msg: "GitHub CLI (gh) is required but not installed. Run 'brew install gh' or equivalent."
      - sh: 'test -n "{{.FILE}}"'
        msg: "Missing FILE argument. Usage: task git:pr FILE=your-story.md"
      - sh: 'test -f "{{.STORY_PATH}}"'
        msg: "The file '{{.STORY_PATH}}' does not exist. Ensure it is placed in the ./pr_stories/ directory."
    cmds:
      - task: check
      - echo "Staging a temporary deployment copy of {{.STORY_PATH}}..."
      - cp "{{.STORY_PATH}}" temp_pr_story.md
      - echo "Pushing branch {{.CURRENT_BRANCH}} to origin..."
      - git push origin {{.CURRENT_BRANCH}}
      - echo "Creating pull request via GitHub API..."
      - gh pr create --title "{{.TITLE}}" --body-file temp_pr_story.md
      - echo "PR created successfully! Cleaning up intermediate assets..."
      - rm temp_pr_story.md

  git:post-merge-branch:
    desc: Switch to main and hard-reset to origin/main after a merged PR
    cmds:
      - |
        CURRENT_BRANCH=$(git branch --show-current)
        if [ "$CURRENT_BRANCH" = "main" ] || [ "$CURRENT_BRANCH" = "master" ]; then
          echo "Error: You are already on $CURRENT_BRANCH. Run this command from your topic branch before switching."
          exit 1
        fi
        echo "Post-merge cleanup for branch: $CURRENT_BRANCH"
        git switch main
        git fetch --all
        git reset --hard origin/main
        git branch -d "$CURRENT_BRANCH"


  git:merge:
    desc: Squash and merge the current branch's PR on GitHub and delete the branch
    preconditions:
      - sh: command -v gh >/dev/null 2>&1
        msg: "GitHub CLI (gh) is required but not installed."
    cmds:
      - gh pr merge --squash --delete-branch

  git:status:
    desc: Check the status and checks of the current PR on GitHub
    preconditions:
      - sh: command -v gh >/dev/null 2>&1
        msg: "GitHub CLI (gh) is required but not installed."
    cmds:
      - gh pr status
      - gh pr checks

  git:diff:
    desc: Show diff of the current branch against main branch
    cmds:
      - git diff origin/main...HEAD

  git:sync-after-merge:
    desc: Fetch latest main and merge it into the current branch
    cmds:
      - git fetch --all
      - git reset --hard origin/main 

  git:stage-commit-push:
    desc: "Stage, commit and push the current branch to origin. USAGE: task git:stage-commit-push MESSAGE='feat: add new feature'"
    vars:
      FORCE: '{{.FORCE | default "false"}}'
    preconditions:
      - sh: 'test -n "{{.MESSAGE}}"'
        msg: "Missing MESSAGE argument. Usage: task git:stage-commit-push MESSAGE='feat: add new feature'"
    cmds:
      - git add .
      - git commit -m "{{.MESSAGE}}"
      - if [ "{{.FORCE}}" = "true" ]; then git push -u origin HEAD --force-with-lease; else git push -u origin HEAD; fi


  # --- Docker Tasks --- #
  docker:build:
    desc: Build the unified production Docker image using BuildKit
    cmds: 
      - docker build -t clible-v3 .

  docker:run:
    desc: Run the unified production Docker image locally
    cmds:
      - echo "Starting Clible-v3 container on http://localhost:8080"
      - docker run -p 8080:8080 --name clible-v3-app --rm clible-v3